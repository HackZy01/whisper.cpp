name: Build Whisper Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Ensure directories exist before the script runs
      - name: Create asset directories
        run: |
          mkdir -p app/src/main/assets/models
          mkdir -p app/src/main/assets/samples

      - name: Download Whisper Model via Remote Script
        run: |
          curl -s https://raw.githubusercontent.com/ggerganov/whisper.cpp/master/models/download-ggml-model.sh | \
          bash -s -- medium app/src/main/assets/models

      - name: Download Sample Audio (jfk.wav)
        run: |
          curl -L -o app/src/main/assets/samples/jfk.wav https://raw.githubusercontent.com/ggerganov/whisper.cpp/master/samples/jfk.wav

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Use 'assembleRelease' to generate the APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # Use a wildcard search to find the APK regardless of the subfolder name
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whisper-release-apk
          path: "**/build/outputs/apk/release/*.apk"
          if-no-files-found: error
