name: Build Whisper Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create asset directories
        run: |
          mkdir -p app/src/main/assets/models
          mkdir -p app/src/main/assets/samples

      - name: Download Whisper Model using Script
        run: |
          # 1. Make the script executable
          chmod +x ./download-ggml-model.sh
          
          # 2. Run the script. 
          # Argument 1: The model name (e.g., tiny, base.en, small-q5_1)
          # Argument 2: The output path we created in the previous step
          ./download-ggml-model.sh medium app/src/main/assets/models

      - name: Download Sample Audio (jfk.wav)
        run: |
          echo "Downloading sample audio..."
          curl -L -o app/src/main/assets/samples/jfk.wav https://raw.githubusercontent.com/ggerganov/whisper.cpp/master/samples/jfk.wav

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whisper-release-apk
          path: app/build/outputs/apk/release/*.apk
